<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hand-Controlled Displacement Orb</title>
<style>
  body { margin: 0; overflow: hidden; background: #000;
         font-family: 'Helvetica Neue', sans-serif; color: #eee; }
  canvas { display: block; }
  #hud {
    position: fixed; top: 18px; left: 20px; z-index: 10;
    padding: 14px 18px; background: rgba(10,10,15,0.45);
    backdrop-filter: blur(8px); border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    font-size: 12px; letter-spacing: 0.5px; line-height: 1.7;
    text-transform: uppercase;
  }
  #hud h1 {
    margin: 0 0 8px 0; font-size: 13px; color: #fff;
    letter-spacing: 2px; font-weight: 300;
  }
  .row { display: flex; justify-content: space-between; gap: 24px; }
  .lbl { color: #888; }
  .v { color: #fff; font-variant-numeric: tabular-nums; }
  #legend {
    position: fixed; bottom: 18px; left: 20px; z-index: 10;
    padding: 10px 14px; background: rgba(10,10,15,0.45);
    backdrop-filter: blur(8px); border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    font-size: 11px; color: #aaa; letter-spacing: 0.5px;
  }
  #legend b { color: #fff; }
  #palette-name {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 72px; letter-spacing: 12px; color: rgba(255,255,255,0);
    font-weight: 100; pointer-events: none;
    transition: color 0.6s ease-out;
    z-index: 5;
  }
  #palette-name.flash { color: rgba(255,255,255,0.85);
                        transition: color 0s; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
</head>
<body>

<div id="hud">
  <h1>Displacement Orb</h1>
  <div class="row"><span class="lbl">palette</span><span class="v" id="hud-pal">Lava</span></div>
  <div class="row"><span class="lbl">gesture</span><span class="v" id="hud-g">—</span></div>
  <div class="row"><span class="lbl">amplitude</span><span class="v" id="hud-amp">0.00</span></div>
  <div class="row"><span class="lbl">frequency</span><span class="v" id="hud-freq">0.00</span></div>
  <div class="row"><span class="lbl">orbit</span><span class="v" id="hud-orb">0.00</span></div>
</div>

<div id="palette-name"></div>

<div id="legend">
  <b>thumbs_up</b> next palette &nbsp;•&nbsp;
  <b>thumbs_down</b> prev palette &nbsp;•&nbsp;
  <b>rock</b> impulse
</div>

<script>
// ============================================================
// WebSocket — matches landmarks.py payload
// ============================================================
const target = { pinch_index: 1, pinch_middle: 1, rotation: 0.5,
                 gesture: 'unknown', gesture_confidence: 0 };
const current = { pinch_index: 1, pinch_middle: 1, rotation: 0.5 };

const ws = new WebSocket('ws://localhost:8765');
ws.onmessage = (e) => {
  const d = JSON.parse(e.data);
  target.pinch_index = d.pinch_index;
  target.pinch_middle = d.pinch_middle;
  target.rotation = d.rotation;
  target.gesture = d.gesture ?? 'unknown';
  target.gesture_confidence = d.gesture_confidence ?? 0;
};

// ============================================================
// Gesture edge-trigger (only thumbs_up / thumbs_down / rock)
// ============================================================
let lastTriggered = 'unknown';
let cooldown = 0;
const CONF = 0.75;
const COOLDOWN = 30;
function dispatch(g, c) {
  if (cooldown > 0) { cooldown--; return; }
  if (c < CONF) { lastTriggered = 'unknown'; return; }
  if (g === lastTriggered) return;
  if      (g === 'thumbs_up')   nextPalette(+1);
  else if (g === 'thumbs_down') nextPalette(-1);
  else if (g === 'rock')        impulse();
  else { lastTriggered = g; return; }
  cooldown = COOLDOWN;
  lastTriggered = g;
}

// ============================================================
// Three.js scene
// ============================================================
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.12);

const camera = new THREE.PerspectiveCamera(
  45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 4);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

// Lighting: a warm key + cool rim + soft ambient — classic 3-point.
const keyLight  = new THREE.PointLight(0xffffff, 1.8, 10);
keyLight.position.set(3, 2, 3);
const rimLight  = new THREE.PointLight(0xffffff, 1.4, 10);
rimLight.position.set(-3, -1, 2);
const ambient   = new THREE.AmbientLight(0x202020, 1);
scene.add(keyLight, rimLight, ambient);

// ============================================================
// The orb
// IcosahedronGeometry(radius, detail). detail=5 -> ~10242 verts,
// too heavy for per-frame CPU displacement + normal recompute.
// detail=4 -> 2562 verts; smooth enough with vertex shading.
// ============================================================
const geometry = new THREE.IcosahedronGeometry(1, 4);
const basePositions = new Float32Array(geometry.attributes.position.array);

const material = new THREE.MeshPhysicalMaterial({
  color: 0xff6a00,
  metalness: 0.35,
  roughness: 0.25,
  clearcoat: 1.0,
  clearcoatRoughness: 0.1,
  reflectivity: 0.6,
  emissive: 0x110500,
});

const orb = new THREE.Mesh(geometry, material);
scene.add(orb);

// Inner glow sphere — a slightly smaller, additive inner orb
// makes the displacement look like it's glowing from within.
const innerMat = new THREE.MeshBasicMaterial({
  color: 0xff3300, transparent: true, opacity: 0.25,
  blending: THREE.AdditiveBlending,
});
const innerOrb = new THREE.Mesh(
  new THREE.IcosahedronGeometry(0.85, 3), innerMat);
scene.add(innerOrb);

// ============================================================
// Post-processing: bloom
// ============================================================
const composer = new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera));
const bloom = new THREE.UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  1.3,   // strength
  0.6,   // radius
  0.15); // threshold — low, so the whole orb glows
composer.addPass(bloom);

// ============================================================
// Palettes
// Each palette = {name, surface color, emissive, inner glow, key/rim lights}
// ============================================================
const palettes = [
  { name: 'LAVA',    surface: 0xff6a00, emissive: 0x2a0a00,
    inner: 0xff3300, key: 0xfff0d0, rim: 0xff2200 },
  { name: 'OCEAN',   surface: 0x00a2ff, emissive: 0x001a2a,
    inner: 0x00ddff, key: 0xd0ecff, rim: 0x0055ff },
  { name: 'NEON',    surface: 0xff00cc, emissive: 0x1a0015,
    inner: 0xaa00ff, key: 0xffd0ff, rim: 0x5500ff },
  { name: 'AURORA',  surface: 0x00ffa2, emissive: 0x001a10,
    inner: 0x55ffaa, key: 0xd0ffe6, rim: 0x00ff55 },
  { name: 'PEARL',   surface: 0xffffff, emissive: 0x111111,
    inner: 0xffffff, key: 0xffffff, rim: 0x8899aa },
  { name: 'EMBER',   surface: 0xff2200, emissive: 0x220000,
    inner: 0xff8800, key: 0xffaa66, rim: 0xff0000 },
];
let palIdx = 0;

function applyPalette(i) {
  const p = palettes[i];
  material.color.setHex(p.surface);
  material.emissive.setHex(p.emissive);
  innerMat.color.setHex(p.inner);
  keyLight.color.setHex(p.key);
  rimLight.color.setHex(p.rim);
  bloom.strength = p.name === 'PEARL' ? 0.9 : 1.3;
  const label = document.getElementById('palette-name');
  label.innerText = p.name;
  label.classList.remove('flash');
  void label.offsetWidth;
  label.classList.add('flash');
  document.getElementById('hud-pal').innerText = p.name;
}
function nextPalette(dir) {
  palIdx = (palIdx + dir + palettes.length) % palettes.length;
  applyPalette(palIdx);
}
applyPalette(0);

// ============================================================
// Impulse (rock gesture)
// A spike added to the displacement amplitude that decays back.
// ============================================================
let impulseEnergy = 0;
function impulse() { impulseEnergy = 1.0; }

// ============================================================
// Pseudo-noise: sum of sinusoids in different directions.
// Smooth, cheap, continuous in 3D — looks just like noise at 3 octaves.
// ============================================================
function noise3(x, y, z) {
  return (
    Math.sin(x * 1.7 + y * 2.3 + z * 1.1) +
    Math.sin(y * 1.9 - z * 2.1 + x * 0.7) +
    Math.sin(z * 2.4 + x * 1.3 - y * 1.7)
  ) / 3;
}

// ============================================================
// Animation
// Displacement formula per vertex:
//   p' = p_base * (1 + amp * Σ octaves)
// where each octave adds noise(p·freq + t) with halving amplitude.
// Operating along the base position direction (which for a sphere
// of radius 1 is identical to the surface normal) = "push outward".
// ============================================================
const positions = geometry.attributes.position.array;
const OCTAVES = 3;

function animate() {
  requestAnimationFrame(animate);

  // Smoothed hand state — pinches are noisy raw.
  current.pinch_index  += (target.pinch_index  - current.pinch_index)  * 0.12;
  current.pinch_middle += (target.pinch_middle - current.pinch_middle) * 0.12;
  current.rotation     += (target.rotation     - current.rotation)     * 0.12;
  dispatch(target.gesture, target.gesture_confidence);

  const t = performance.now() * 0.0003;

  // Map pinches to physical dials.
  // pinch_index 0 -> fully squished pinch -> calm orb (low amp)
  // pinch_index 1 -> open hand -> large amplitude
  const amp  = current.pinch_index * 0.45 + impulseEnergy * 0.9;
  const freq = 1.0 + current.pinch_middle * 3.5;

  // Impulse decays exponentially.
  impulseEnergy *= 0.94;

  // Displace every vertex.
  for (let i = 0; i < positions.length; i += 3) {
    const bx = basePositions[i];
    const by = basePositions[i + 1];
    const bz = basePositions[i + 2];
    let n = 0, f = freq, a = 1, norm = 0;
    for (let o = 0; o < OCTAVES; o++) {
      n += noise3(bx * f + t, by * f + t * 0.7, bz * f - t * 0.3) * a;
      norm += a;
      f *= 2;
      a *= 0.5;
    }
    n /= norm;
    const d = 1 + amp * n;
    positions[i]     = bx * d;
    positions[i + 1] = by * d;
    positions[i + 2] = bz * d;
  }
  geometry.attributes.position.needsUpdate = true;
  geometry.computeVertexNormals();

  // Orbit camera around the orb using rotation parameter.
  // rotation 0.5 = front view; off-center = yaw the camera.
  const yaw = (current.rotation - 0.5) * Math.PI * 2;
  camera.position.x = Math.sin(yaw) * 4;
  camera.position.z = Math.cos(yaw) * 4;
  camera.position.y = Math.sin(yaw * 0.3) * 0.6;
  camera.lookAt(0, 0, 0);

  // Slow autonomous orb spin for life.
  orb.rotation.y += 0.002;
  innerOrb.rotation.y -= 0.003;
  innerOrb.rotation.x += 0.001;

  // HUD
  document.getElementById('hud-g').innerText =
    `${target.gesture} (${target.gesture_confidence.toFixed(2)})`;
  document.getElementById('hud-amp').innerText = amp.toFixed(2);
  document.getElementById('hud-freq').innerText = freq.toFixed(2);
  document.getElementById('hud-orb').innerText = yaw.toFixed(2);

  composer.render();
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
